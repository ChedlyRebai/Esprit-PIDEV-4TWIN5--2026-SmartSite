name: CD resource-optimization

on:
  workflow_run:
    workflows:
      - 'CI resource-optimization'
    types:
      - completed

jobs:
  cd:
    name: Deploy resource-optimization
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build de l'image Docker
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/resource-optimization:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/resource-optimization:${{ github.event.workflow_run.head_sha }} \
            apps/backend/resource-optimization

      - name: Push de l'image Docker
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/resource-optimization:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/resource-optimization:${{ github.event.workflow_run.head_sha }}

      - name: Déploiement sur Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d -i > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl config view
          kubectl set image deployment/resource-optimization \
            resource-optimization=${{ secrets.DOCKER_USERNAME }}/resource-optimization:${{ github.event.workflow_run.head_sha }} \
            -n smartsite
          kubectl rollout status deployment/resource-optimization -n smartsite --timeout=120s

      - name: Confirmation du déploiement
        run: echo "✅ resource-optimization déployé avec le tag ${{ github.event.workflow_run.head_sha }}"
