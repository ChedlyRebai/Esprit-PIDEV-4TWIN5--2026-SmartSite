apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-optimization
  namespace: smartsite
  labels:
    app: resource-optimization
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resource-optimization
  template:
    metadata:
      labels:
        app: resource-optimization
    spec:
      containers:
        - name: resource-optimization
          image: chedlyrebai/resource-optimization-api:latest
          ports:
            - containerPort: 3007
          env:
            - name: PORT
              value: "3007"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: resource-optimization-secret
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: resource-optimization-secret
                  key: JWT_SECRET
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: resource-optimization-secret
                  key: GROQ_API_KEY

---
apiVersion: v1
kind: Service
metadata:
  name: resource-optimization
  namespace: smartsite
  labels:
    app: resource-optimization
spec:
  type: ClusterIP
  selector:
    app: resource-optimization
  ports:
    - port: 3007
      targetPort: 3007
      protocol: TCP
