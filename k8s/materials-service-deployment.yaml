apiVersion: apps/v1
kind: Deployment
metadata:
  name: materials-service
  labels:
    app: materials-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: materials-service
  template:
    metadata:
      labels:
        app: materials-service
    spec:
      containers:
      - name: materials-service
        image: ghada/smartsite-materials-service:latest
        ports:
        - containerPort: 3009
        env:
        - name: PORT
          value: "3009"
        - name: NODE_ENV
          value: "production"
        - name: MONGODB_URI
          value: "mongodb://mongodb-service:27017/smartsite-materials"
        - name: ML_PREDICTION_SERVICE_URL
          value: "http://ml-prediction-service:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: materials-service
spec:
  type: NodePort
  selector:
    app: materials-service
  ports:
  - protocol: TCP
    port: 3009
    targetPort: 3009
    nodePort: 30009
