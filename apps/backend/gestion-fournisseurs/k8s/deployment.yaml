apiVersion: apps/v1
kind: Deployment
metadata:
  name: gestion-fournisseurs
  namespace: default
  labels:
    app: gestion-fournisseurs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gestion-fournisseurs
  template:
    metadata:
      labels:
        app: gestion-fournisseurs
    spec:
      containers:
        - name: gestion-fournisseurs
          image: ghadabannourii/smartsite-gestion-fournisseurs:latest
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3005"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smartsite-secrets
                  key: mongodb-uri
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gestion-fournisseurs-service
  namespace: default
spec:
  selector:
    app: gestion-fournisseurs
  ports:
    - protocol: TCP
      port: 3005
      targetPort: 3005
      nodePort: 30005
  type: NodePort
