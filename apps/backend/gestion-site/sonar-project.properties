sonar.projectKey=smartsite-gestion-site
sonar.projectName=SmartSite - Gestion Site
sonar.projectVersion=1.0
sonar.sources=.
sonar.inclusions=*.ts,dto/**/*.ts,entities/**/*.ts
sonar.exclusions=**/*.spec.ts,**/*.test.ts,**/node_modules/**,**/dist/**
sonar.tests=src
