apiVersion: apps/v1
kind: Deployment
metadata:
  name: materials-service
  namespace: default
  labels:
    app: materials-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: materials-service
  template:
    metadata:
      labels:
        app: materials-service
    spec:
      containers:
        - name: materials-service
          image: ghadabannourii/smartsite-materials-service:latest
          ports:
            - containerPort: 3009
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3009"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: smartsite-secrets
                  key: mongodb-uri
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: materials-service
  namespace: default
spec:
  selector:
    app: materials-service
  ports:
    - protocol: TCP
      port: 3009
      targetPort: 3009
      nodePort: 30009
  type: NodePort
