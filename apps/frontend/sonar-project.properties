# ── Project identification ────────────────────────────────────────────────────
sonar.projectKey=smartsite-frontend
sonar.projectName=SmartSite - Frontend
sonar.projectVersion=1.0.0

# ── Source — only testable files ─────────────────────────────────────────────
sonar.sources=src/services,src/utils,src/lib,src/hooks,src/app/utils,src/app/store,src/app/types

# ── Tests ─────────────────────────────────────────────────────────────────────
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.sonar.json
