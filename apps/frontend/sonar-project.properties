# ── Project identification ────────────────────────────────────────────────────
sonar.projectKey=smartsite-frontend
sonar.projectName=SmartSite - Frontend
sonar.projectVersion=1.0.0

# ── Source & language ─────────────────────────────────────────────────────────
sonar.sources=src
sonar.exclusions=**/*.test.tsx,**/*.test.ts,**/node_modules/**,**/dist/**,**/styles/**

# ── Tests ─────────────────────────────────────────────────────────────────────
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Coverage exclusions (fichiers UI complexes non testables unitairement) ────
sonar.coverage.exclusions=\
  **/components/ui/**,\
  **/app/pages/**,\
  **/app/layouts/**,\
  **/app/components/**,\
  **/lib/videocall/**,\
  **/app/action/**,\
  **/app/hooks/**,\
  **/app/provider/**,\
  **/app/context/**,\
  **/features/**/components/**,\
  **/features/**/pages/**,\
  **/components/chat/**,\
  **/components/geocoding/**,\
  **/components/orders/**,\
  **/components/videoCall/**,\
  **/components/suppliers/**,\
  **/components/ExpiringMaterials.tsx,\
  **/components/kanban.tsx,\
  **/app/App.tsx,\
  **/app/Navbar.tsx,\
  **/app/routes.tsx,\
  **/main.tsx

# ── TypeScript — utiliser tsconfig.sonar.json (compatible SonarQube 9.9) ─────
sonar.typescript.tsconfigPath=tsconfig.sonar.json
