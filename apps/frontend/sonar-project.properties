# ── Project identification ────────────────────────────────────────────────────
sonar.projectKey=smartsite-frontend
sonar.projectName=SmartSite - Frontend
sonar.projectVersion=1.0.0

# ── Source — only testable files (services, utils, lib) ──────────────────────
sonar.sources=src/services,src/utils,src/lib,src/app/utils,src/app/store,src/hooks

# ── Exclusions ────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/*.test.tsx,\
  **/*.test.ts,\
  **/node_modules/**,\
  **/dist/**,\
  **/lib/videocall/**,\
  **/lib/planning-gantt-api.ts

# ── Tests ─────────────────────────────────────────────────────────────────────
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.sonar.json
