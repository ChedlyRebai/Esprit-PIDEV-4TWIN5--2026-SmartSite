# ── Project identification ────────────────────────────────────────────────────
sonar.projectKey=smartsite-frontend
sonar.projectName=SmartSite - Frontend
sonar.projectVersion=1.0.0

# ── Source & language ─────────────────────────────────────────────────────────
sonar.sources=src
sonar.exclusions=\
  **/*.test.tsx,\
  **/*.test.ts,\
  **/node_modules/**,\
  **/dist/**,\
  **/styles/**,\
  **/styles/index.css,\
  **/styles/tailwind.css,\
  **/styles/theme.css

# ── Tests ─────────────────────────────────────────────────────────────────────
sonar.tests=src
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts

# ── Coverage ──────────────────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Coverage exclusions ───────────────────────────────────────────────────────
sonar.coverage.exclusions=\
  **/app/pages/**,\
  **/app/layouts/**,\
  **/app/components/**,\
  **/app/action/**,\
  **/app/hooks/**,\
  **/app/provider/**,\
  **/app/context/**,\
  **/app/store/**,\
  **/app/App.tsx,\
  **/app/Navbar.tsx,\
  **/app/routes.tsx,\
  **/main.tsx,\
  **/components/ui/**,\
  **/components/chat/**,\
  **/components/geocoding/**,\
  **/components/orders/**,\
  **/components/videoCall/**,\
  **/components/suppliers/**,\
  **/components/ExpiringMaterials.tsx,\
  **/components/kanban.tsx,\
  **/lib/videocall/**,\
  **/features/**

# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.sonar.json
